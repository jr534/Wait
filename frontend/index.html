<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WAIT Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="conversation" aria-label="Conversation WAIT">
        <header class="topbar">
          <div>
            <p class="eyebrow">WAIT</p>
            <h1>Latence visible pour interfaces RAG</h1>
          </div>
          <span id="status" class="status">Deconnecte</span>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div id="waitRail" class="wait-rail" aria-label="Progression d'attente"></div>

        <form id="askForm" class="composer">
          <input
            id="requestInput"
            name="request"
            type="text"
            autocomplete="off"
            placeholder="Pose une question au systeme WAIT"
            required
          />
          <button type="submit">Envoyer</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
